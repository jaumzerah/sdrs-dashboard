<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SDR Ops Login</title>
  <link rel="stylesheet" href="/static/dashboard.css" />
</head>
<body class="login-body">
  <main class="login-shell">
    <section class="login-card">
      <p class="eyebrow">Acesso Restrito</p>
      <h1>SDR Ops</h1>
      <p>Entre para monitorar operacao, integracoes e governar prompts.</p>
      <form id="login-form">
        <label for="login-username">Usuario</label>
        <input id="login-username" type="text" name="username" required autocomplete="username" />
        <label for="login-password">Senha</label>
        <input id="login-password" type="password" name="password" required autocomplete="current-password" />
        <button type="submit">Entrar</button>
      </form>
      <p id="login-error" class="error" aria-live="polite"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById('login-form');
    const error = document.getElementById('login-error');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      error.textContent = '';
      const payload = {
        username: form.username.value,
        password: form.password.value,
      };

      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
      });

      if (!response.ok) {
        error.textContent = 'Credenciais invalidas';
        return;
      }

      window.location.href = '/';
    });
  </script>
</body>
</html>
